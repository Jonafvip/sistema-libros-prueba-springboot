spring:
  application:
    name: SistemaLibros

  datasource:
    url: jdbc:postgresql://localhost:5432/Sistema_Gestion_Hospital
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080
